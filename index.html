<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ride Along Report</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            margin: 0;
            padding: 0;
            background: url('logo.png') no-repeat center center fixed;
            background-size: contain; /* Full logo without cropping */
            color: #333;
            display: flex;
            align-items: center; /* Vertical center */
            justify-content: center; /* Horizontal center */
            min-height: 100vh; /* Full height */
        }
        #app {
            max-width: 600px;
            width: 90%; /* Symmetry, no overflow */
            background: rgba(255, 255, 255, 0.1); /* Glassmorphism: semi-transparent */
            backdrop-filter: blur(10px); /* Liquid glass blur effect */
            border: 1px solid rgba(255, 255, 255, 0.2); /* Subtle border for glass */
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1); /* Soft shadow */
            text-align: center; /* Symmetry */
        }
        h1 {
            color: #FFD700; /* Gold theme */
            text-align: center;
        }
        .screen {
            display: none;
        }
        .active {
            display: block;
        }
        input, textarea {
            width: calc(100% - 24px); /* Prevent overflow, centered */
            padding: 12px;
            margin: 10px auto; /* Center */
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
            display: block;
            text-align: center; /* Center text in input */
        }
        textarea {
            height: 300px;
            resize: vertical;
        }
        button {
            padding: 12px 20px;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        .choice-button {
            display: block;
            width: 100%;
            margin: 10px 0;
            background: linear-gradient(to right, #B8860B, #000); /* Black mixed with gold gradient */
            color: #fff; /* White text for contrast */
            text-align: left;
            white-space: normal;
        }
        .choice-button:hover, .choice-button.selected {
            background: linear-gradient(to right, #DAA520, #333); /* Darker variant on hover */
            color: #fff;
        }
        .nav-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
        }
        .nav-buttons button {
            background: transparent; /* No background color */
            color: #FFD700; /* Gold text */
            border: 1px solid #FFD700; /* Gold border for visibility */
        }
        .nav-buttons button:disabled {
            background: transparent;
            color: #ccc;
            border: 1px solid #ccc;
            cursor: not-allowed;
        }
        #copy-btn {
            background: #FFD700; /* Gold */
            color: #000;
            width: 100%;
        }
        #copy-btn:hover {
            background: #DAA520; /* Darker gold */
        }
        #stops-behind-input {
            display: none;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div id="app">
        <h1>Ride-Along Report</h1>
        <div id="name-screen" class="screen">
            <label for="driver-name">Driver's Name</label>
            <input type="text" id="driver-name" placeholder="Enter Driver's Name">
        </div>
        <!-- Choice screens will be dynamically generated -->
        <div id="result-screen" class="screen">
            <h2>Generated Summary</h2>
            <textarea id="summary-text"></textarea>
            <button id="copy-btn" onclick="copySummary()">Copy to Clipboard</button>
        </div>
        <div class="nav-buttons">
            <button id="prev-btn" onclick="prevPage()" disabled>Previous</button>
            <button id="next-btn" onclick="nextPage()">Next</button>
        </div>
    </div>
    <script>
        // Define skills and notes
        const skills = [
            { id: 'flex', label: 'Flex App Usage', good: 'Good understanding of Flex app usage.', mid: 'Needs time to get used to the Flex app.', bad: 'Limited understanding of Flex app usage.' },
            { id: 'organize_van', label: 'Organize Van', good: 'Knows how to organize van with overflows and bags.', mid: 'Needs more practice organizing van with overflows and bags.', bad: 'Does not know how to organize van with overflows and bags.' },
            { id: 'bag_overflow', label: 'Bag vs Overflows', good: 'Understands difference between bag packages and overflows; knows where to look without wasting time.', mid: 'Partial understanding of bag vs overflows; some confusion.', bad: 'Confuses bag packages and overflows; wastes time searching wrong places.' },
            { id: 'customer_instructions', label: 'Customer Instructions', good: 'Follows customer instructions.', mid: 'Follows customer instructions with minor issues.', bad: 'Does not follow customer instructions consistently.' },
            { id: 'language', label: 'Language Challenges', good: 'No language challenges noted.', mid: 'Minor language challenges.', bad: 'Language Barrier.' },
            { id: 'mark_undeliverable', label: 'Mark Undeliverable', good: 'Knows how to mark undeliverable packages correctly (e.g., damage, missing, closed business).', mid: 'Needs guidance on marking undeliverable packages.', bad: 'Does not know how to mark undeliverable packages correctly.' },
            { id: 'photos', label: 'Photos', good: 'Takes clear photos.', mid: 'Photos need improvement.', bad: 'Takes unclear or poor photos.' },
            { id: 'polite', label: 'Polite with Customers', good: 'Polite with customers.', mid: 'Generally polite, but room for improvement.', bad: 'Not always polite with customers.' },
            { id: 'driving', label: 'Driving Skills', good: 'Strong driver: full stops, speed limits, follows traffic rules.', mid: 'Adequate driver, needs some refinement.', bad: 'Weak driver: ignores stops, speeds, breaks traffic rules.' },
            { id: 'building_deliveries', label: 'Building Deliveries', good: 'Knows how to handle building deliveries: upstairs, package rooms, reception, organizes by floor.', mid: 'Needs more practice with building deliveries.', bad: 'Struggles with building deliveries: avoids upstairs, mishandles package rooms/reception, poor organization.' },
            { id: 'house_deliveries', label: 'House Deliveries', good: 'Knows how to handle house deliveries: organizes packages, special notes (e.g., back door), multiple stops.', mid: 'Needs more practice with house deliveries.', bad: 'Struggles with house deliveries: poor organization, ignores special notes, risks multiple-stop errors.' },
            { id: 'delivery_speed', label: 'Delivery Speed', good: 'Delivers quickly: photo and go.', mid: 'Delivery speed is average; takes extra time.', bad: 'Delivers slowly; lingers at stops.' },
            { id: 'identify_addresses', label: 'Identify Addresses', good: 'Identifies addresses accurately.', mid: 'Occasionally struggles with address identification.', bad: 'Struggles to identify addresses accurately.' },
            { id: 'parking', label: 'Parking Sequence', good: 'Knows proper parking sequence.', mid: 'Needs reminder on parking sequence.', bad: 'Does not know proper parking sequence.' },
            { id: 'gps', label: 'Map/GPS Skills', good: 'Good map/GPS skills.', mid: 'Needs improvement on map/GPS skills.', bad: 'Poor map/GPS skills.' },
            { id: 'learner', label: 'Learning Speed', good: 'Quick learner overall.', mid: 'Average learner; takes time.', bad: 'Slow learner overall.' },
            { id: 'attitude', label: 'Attitude', good: 'Positive attitude and eager to learn.', mid: 'Neutral attitude; moderate interest in learning.', bad: 'Negative attitude or reluctant to learn.' },
            { id: 'gas_card', label: 'Gas Card & Powered by Amazon App', good: 'Knows how to use the gas card and Powered by Amazon app.', mid: 'Needs more guidance on using the gas card and Powered by Amazon app.', bad: 'Does not know how to use the gas card and Powered by Amazon app.' },
            { id: 'time_card', label: 'Timecard Editing', good: 'Knows how to edit timecard and meal period times.', mid: 'Needs more guidance on editing timecard and meal period times.', bad: 'Does not know how to edit timecard and meal period times.' },
            { id: 'feels_ready', label: 'Feels Ready', good: 'Feels ready and confident to go solo on the next scheduled day.', mid: 'Needs one more day of training; does not feel confident going alone yet.', bad: 'Does not feel ready to go solo on the next scheduled day.' },
            { id: 'driver_feeling', label: 'Driver Feeling', overwhelmed: '😵‍💫 Feels overwhelmed about the job.', happy: '😊 Feels happy about the job.', confident: '💪 Feels confident about the job.', challenged: '🏆 Feels challenged in a positive way.', good_mental: '👍 Good mental state.', bad_mental: '👎 Bad mental state.', lazy: '😴 Seems lazy about the job.' },
            { id: 'overall_comment', label: 'Overall Comment', killed_it: '🔥 Killed it today', struggled: '🙈 Struggled today', had_easy: '😎 Had it easy today', pushed_through: '🫡 Pushed through it today', did_amazing: '🤩 Did amazing today', had_fun: '🤪 Had fun today', did_crazy: '🥶 Did crazy today', did_insane: '🤯 Did insaneeee today', hmm: '🤔 Hmm today', overwhelmed_today: '🫨 Overwhelmed today', did_good: '🤘🏼 Did good today' }
        ];
        const notes = [
            { id: 'coached', text: '🚨 Emergency coached on-road: Driver required interruption for re-training due to falling behind.', label: 'Emergency Coached On-Road', has_input: true, input_label: 'Stops Behind', input_id: 'stops-behind' },
            { id: 'morning_issues', text: '⚠️ Faced issues with the van at the start of the route.', label: 'Morning Van Issues' },
            { id: 'equipment_issues', text: '⚠️ Faced issues with equipment (phone).', label: 'Equipment Issues' },
            { id: 'route_issues', text: '⚠️ Faced issues with the route itself (awful route, bad sequencing).', label: 'Route Issues' },
            { id: 'only_buildings', text: '⚠️ Only buildings route.', label: 'Only Buildings Route' },
            { id: 'not_nursery', text: '⚠️ Had to do a non-nursery route.', label: 'Non-Nursery Route' },
            { id: 'no_more_training', text: "Doesn't need more training overall.", label: 'No More Training' },
            { id: 'handled_challenges', text: '✅ Handled challenges like OTP issues; strengthened skills.', label: 'Handled Challenges' },
            { id: 'experienced', text: 'Experienced from prior routes.', label: 'Experienced' },
            { id: 'more_details', text: 'More details available if needed.', label: 'More Details' },
            { id: 'checklist', text: '📋 Ride-along checklist will be posted soon (time constraint prevented signing today).', label: 'Checklist Posting', emote: '😓' }
        ];
        // State
        let state = {
            name: '',
            selections: {},
            stops_behind: ''
        };
        const totalChoicePages = skills.length + notes.length;
        const resultPageIndex = totalChoicePages + 1;
        let currentPage = 0;
        // Initialize selections
        skills.forEach(s => { state.selections[s.id] = null; });
        notes.forEach(n => { state.selections[n.id] = null; });
        // Create choice screens
        function createChoiceScreens() {
            skills.forEach((item, index) => {
                const screen = document.createElement('div');
                screen.id = `screen-${index + 1}`;
                screen.className = 'screen';
                let innerHTML = `<h2>${item.label}</h2>`;
                if (item.id === 'driver_feeling' || item.id === 'overall_comment') {
                    const options = Object.keys(item).filter(key => key !== 'id' && key !== 'label');
                    options.forEach(opt => {
                        innerHTML += `<button class="choice-button" data-value="${opt}" onclick="selectChoice('${item.id}', '${opt}')">${item[opt]}</button>`;
                    });
                    innerHTML += `<button class="choice-button" data-value="dna" onclick="selectChoice('${item.id}', 'dna')">DNA</button>`;
                } else if (item.id === 'feels_ready') {
                    innerHTML += `
                        <button class="choice-button" data-value="good" onclick="selectChoice('${item.id}', 'good')">${'✅ ' + item.good}</button>
                        <button class="choice-button" data-value="mid" onclick="selectChoice('${item.id}', 'mid')">${'❔ ' + item.mid}</button>
                        <button class="choice-button" data-value="bad" onclick="selectChoice('${item.id}', 'bad')">${'❌ ' + item.bad}</button>
                        <button class="choice-button" data-value="dna" onclick="selectChoice('${item.id}', 'dna')">DNA</button>`;
                } else {
                    innerHTML += `
                        <button class="choice-button" data-value="good" onclick="selectChoice('${item.id}', 'good')">${'✅ ' + item.good}</button>
                        <button class="choice-button" data-value="mid" onclick="selectChoice('${item.id}', 'mid')">${'❔ ' + item.mid}</button>
                        <button class="choice-button" data-value="bad" onclick="selectChoice('${item.id}', 'bad')">${'❌ ' + item.bad}</button>
                        <button class="choice-button" data-value="dna" onclick="selectChoice('${item.id}', 'dna')">DNA</button>`;
                }
                screen.innerHTML = innerHTML;
                document.getElementById('app').insertBefore(screen, document.getElementById('result-screen'));
            });
            notes.forEach((item, index) => {
                const screenIndex = skills.length + index + 1;
                const screen = document.createElement('div');
                screen.id = `screen-${screenIndex}`;
                screen.className = 'screen';
                let innerHTML = `<h2>${item.label}</h2>
                    <button class="choice-button" data-value="include" onclick="selectChoice('${item.id}', 'include')">${item.emote ? item.emote + ' ' : ''}${item.text}</button>
                    <button class="choice-button" data-value="dna" onclick="selectChoice('${item.id}', 'dna')">DNA</button>`;
                if (item.has_input) {
                    innerHTML += `<input type="number" id="${item.input_id}-input" placeholder="${item.input_label}" style="display: none;">`;
                }
                screen.innerHTML = innerHTML;
                document.getElementById('app').insertBefore(screen, document.getElementById('result-screen'));
            });
        }
        createChoiceScreens();
        // Show page
        function showPage(page) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            if (page === 0) {
                document.getElementById('name-screen').classList.add('active');
                document.getElementById('driver-name').value = state.name;
            } else if (page === resultPageIndex) {
                document.getElementById('result-screen').classList.add('active');
                generateSummary();
            } else {
                const screen = document.getElementById(`screen-${page}`);
                screen.classList.add('active');
                const item = page <= skills.length ? skills[page - 1] : notes[page - skills.length - 1];
                const selected = state.selections[item.id];
                const buttons = screen.querySelectorAll('button.choice-button');
                buttons.forEach(btn => {
                    btn.classList.toggle('selected', btn.dataset.value === selected);
                });
                const input = screen.querySelector('input');
                if (input && selected === 'include') {
                    input.style.display = 'block';
                    input.value = state.stops_behind || '';
                } else if (input) {
                    input.style.display = 'none';
                }
            }
            document.getElementById('prev-btn').disabled = (page === 0);
            document.getElementById('next-btn').disabled = (page === resultPageIndex);
            currentPage = page;
        }
        // Select choice
        function selectChoice(id, value) {
            state.selections[id] = value === 'dna' ? null : value;
            const item = notes.find(n => n.id === id) || skills.find(s => s.id === id);
            if (item && item.has_input && value === 'include') {
                // Stay on page to input
                showPage(currentPage);
                return;
            }
            nextPage();
        }
        // Next page
        function nextPage() {
            if (currentPage === 0) {
                state.name = document.getElementById('driver-name').value.trim().toUpperCase();
                if (!state.name) {
                    alert('Please enter a name.');
                    return;
                }
            } else {
                const item = currentPage <= skills.length ? skills[currentPage - 1] : notes[currentPage - skills.length - 1];
                if (item.has_input && state.selections[item.id] === 'include') {
                    const input = document.getElementById(`${item.input_id}-input`);
                    state.stops_behind = input.value.trim();
                }
            }
            if (currentPage < resultPageIndex - 1) {
                currentPage++;
                showPage(currentPage);
            } else {
                currentPage = resultPageIndex;
                showPage(currentPage);
            }
        }
        // Prev page
        function prevPage() {
            if (currentPage > 0) {
                currentPage--;
                showPage(currentPage);
            }
        }
        // Generate summary
        function generateSummary() {
            let message = `${state.name}\n\n`;
            
            // Top: Coached or Overall Comment
            const coached = notes.find(n => n.id === 'coached');
            if (state.selections[coached.id] === 'include') {
                let coachedText = coached.text;
                if (state.stops_behind) {
                    coachedText += ` The driver was ${state.stops_behind} stops behind.`;
                }
                message += coachedText + '\n\n';
            } else if (state.selections['overall_comment']) {
                const overall = skills.find(s => s.id === 'overall_comment')[state.selections['overall_comment']];
                message += `Overall: ${overall}\n\n`;
            }
            
            // Goods including handled challenges
            const goods = skills.filter(s => state.selections[s.id] === 'good' && s.id !== 'feels_ready' && s.id !== 'driver_feeling' && s.id !== 'overall_comment').map(s => `✅ ${s.good}`);
            const handled = notes.find(n => n.id === 'handled_challenges');
            if (state.selections[handled.id] === 'include') {
                goods.push(handled.text);
            }
            const feelsReadyGood = state.selections['feels_ready'] === 'good' ? `✅ ${skills.find(s => s.id === 'feels_ready').good}` : '';
            if (feelsReadyGood) goods.push(feelsReadyGood);
            if (goods.length > 0) message += goods.join('\n') + '\n\n';
            
            // Mids
            const mids = skills.filter(s => state.selections[s.id] === 'mid').map(s => `❔ ${s.mid}`);
            const feelsReadyMid = state.selections['feels_ready'] === 'mid' ? `❔ ${skills.find(s => s.id === 'feels_ready').mid}` : '';
            if (feelsReadyMid) mids.push(feelsReadyMid);
            
            // Bads
            const bads = skills.filter(s => state.selections[s.id] === 'bad' && s.id !== 'feels_ready' && s.id !== 'driver_feeling' && s.id !== 'overall_comment').map(s => `❌ ${s.bad}`);
            const feelsReadyBad = state.selections['feels_ready'] === 'bad' ? `❌ ${skills.find(s => s.id === 'feels_ready').bad}` : '';
            if (feelsReadyBad) bads.push(feelsReadyBad);
            
            // Other mids (notes)
            const otherMids = notes.filter(n => state.selections[n.id] === 'include' && n.id !== 'coached' && n.id !== 'checklist' && n.id !== 'handled_challenges').map(n => `${n.emote ? n.emote + ' ' : '❔ '}${n.text}`);
            
            // Driver feeling
            const driverFeeling = state.selections['driver_feeling'] ? skills.find(s => s.id === 'driver_feeling')[state.selections['driver_feeling']] : '';
            
            // Unfair situations
            const unfair = otherMids.filter(m => m.startsWith('⚠️'));
            
            // Regular mids
            const regularMids = [...mids, ...otherMids.filter(m => !m.startsWith('⚠️')), driverFeeling, ...bads].filter(Boolean);
            
            if (unfair.length > 0) message += unfair.join('\n') + '\n\n';
            if (regularMids.length > 0) message += regularMids.join('\n') + '\n\n';
            
            // Organization help
            if (state.selections['organize_van'] === 'mid' || state.selections['organize_van'] === 'bad') {
                message += '❔ Please help organize the van on the launchpad next working day.\n\n';
            }
            
            // Bottom: Checklist
            const checklist = notes.find(n => n.id === 'checklist');
            if (state.selections[checklist.id] === 'include') {
                message += `${checklist.emote} ${checklist.text}`;
            }
            
            document.getElementById('summary-text').value = message.trim();
        }
        // Copy to clipboard
        function copySummary() {
            const text = document.getElementById('summary-text').value;
            navigator.clipboard.writeText(text).then(() => {
                alert('Copied to clipboard!');
            }).catch(err => {
                alert('Failed to copy: ' + err);
            });
        }
        // Start
        showPage(0);
    </script>
</body>
</html>
